<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password — WorkBase</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:#fafaf8;color:#0d0d0d;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border:1.5px solid #e8e6e1;border-radius:20px;padding:32px 28px;width:100%;max-width:380px;position:relative;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#1a56db,#0891b2);}
.logo{display:flex;align-items:center;gap:6px;margin-bottom:24px;}
.logo-dot{width:8px;height:8px;background:#1a56db;border-radius:50%;}
.logo-text{font-size:18px;font-weight:800;}
h1{font-size:22px;font-weight:800;margin-bottom:6px;}
p{font-size:13px;color:#888;margin-bottom:20px;}
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
label{font-family:'JetBrains Mono',monospace;font-size:10px;color:#3d3d3d;letter-spacing:.5px;text-transform:uppercase;}
input{background:#fafaf8;border:1.5px solid #e8e6e1;border-radius:10px;color:#0d0d0d;font-family:'JetBrains Mono',monospace;font-size:14px;padding:12px 14px;outline:none;width:100%;}
input:focus{border-color:#1a56db;box-shadow:0 0 0 3px rgba(26,86,219,0.1);}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;background:#0d0d0d;color:#fff;margin-top:4px;}
.btn:hover{background:#1a56db;}
.err{font-family:'JetBrains Mono',monospace;font-size:11px;color:#dc2626;min-height:16px;text-align:center;margin-bottom:8px;}
.success{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:10px;padding:16px;text-align:center;font-family:'JetBrains Mono',monospace;font-size:12px;color:#16a34a;}
</style>
</head>
<body>
<div class="card">
  <div class="logo"><div class="logo-dot"></div><div class="logo-text">WorkBase</div></div>
  <div id="formState">
    <h1>Reset Password</h1>
    <p>Enter your new password below.</p>
    <div class="field"><label>New Password</label><input type="password" id="newPwd" placeholder="Min. 6 characters"></div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirmPwd" placeholder="Repeat password"></div>
    <div class="err" id="errMsg"></div>
    <button class="btn" onclick="doReset()">Set New Password →</button>
  </div>
  <div id="successState" style="display:none;">
    <div class="success">✓ Password reset successfully!<br><br><a href="/app.html" style="color:#1a56db;font-weight:700;">Go to Login →</a></div>
  </div>
</div>
<script>
var params = new URLSearchParams(window.location.search);
var token = params.get('token');
var code = params.get('code');
if (!token || !code) {
  document.getElementById('errMsg').textContent = 'Invalid reset link.';
}
async function doReset() {
  var pwd = document.getElementById('newPwd').value.trim();
  var confirm = document.getElementById('confirmPwd').value.trim();
  var err = document.getElementById('errMsg');
  if (!pwd || pwd.length < 6) { err.textContent = 'Password must be at least 6 characters'; return; }
  if (pwd !== confirm) { err.textContent = 'Passwords do not match'; return; }
  try {
    var r = await fetch('https://ems-api-mgye.onrender.com/api/business/reset-password', {
      method: 'POST',
      headers: {'Content-Type':'application/json','x-api-key':'ems-aP7kNx3QvL9mRt2Wz8Yc5Jd'},
      body: JSON.stringify({ code, token, new_password: pwd })
    });
    var data = await r.json();
    if (!r.ok) { err.textContent = data.error || 'Failed'; return; }
    document.getElementById('formState').style.display = 'none';
    document.getElementById('successState').style.display = '';
  } catch(e) { err.textContent = 'Connection error'; }
}
</script>
</body>
</html>
