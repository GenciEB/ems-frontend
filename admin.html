<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMS — Owner Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060e1e;
  --surface:rgba(10,22,48,0.85);
  --surface2:rgba(14,28,58,0.9);
  --border:rgba(59,130,246,0.15);
  --border2:rgba(59,130,246,0.3);
  --blue:#3b82f6;
  --blue2:#60a5fa;
  --cyan:#06b6d4;
  --green:#34d399;
  --red:#f87171;
  --amber:#fbbf24;
  --purple:#a78bfa;
  --text:#e8f0ff;
  --text2:#6b82a8;
  --text3:#3d5070;
  --display:'Syne',sans-serif;
  --body:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --glass:blur(20px) saturate(180%);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:var(--body);color:var(--text);}
body{
  background-image:
    linear-gradient(160deg,rgba(2,6,20,0.92) 0%,rgba(4,10,30,0.88) 100%),
    url('https://images.unsplash.com/photo-1497366811353-6870744d04b2?auto=format&fit=crop&w=1400&q=75');
  background-size:cover;
  background-position:center;
  min-height:100vh;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 50% at 10% 0%, rgba(59,130,246,0.2) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 100%, rgba(6,182,212,0.12) 0%, transparent 60%);
}

/* ── LOGIN ── */
#loginWrap{
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;padding:20px;
}
#loginWrap.hidden{display:none;}
.login-box{
  background:rgba(10,22,48,0.92);
  backdrop-filter:var(--glass);
  border:1px solid var(--border2);
  border-radius:24px;
  padding:36px 28px;
  width:100%;max-width:360px;
  position:relative;overflow:hidden;
  box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan),transparent);}
.login-logo{font-family:var(--display);font-size:48px;font-weight:800;letter-spacing:4px;background:linear-gradient(135deg,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-align:center;margin-bottom:4px;}
.login-sub{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:3px;text-align:center;margin-bottom:28px;}
.field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
label{font-family:var(--mono);font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;}
input{background:rgba(14,28,58,0.8);border:1px solid var(--border2);border-radius:10px;color:var(--text);font-family:var(--mono);font-size:14px;padding:11px 14px;outline:none;width:100%;transition:border-color .2s;}
input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(59,130,246,0.12);}
.btn-login{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;border:none;border-radius:10px;padding:13px;font-family:var(--body);font-size:14px;font-weight:700;width:100%;cursor:pointer;margin-top:8px;transition:opacity .15s;}
.btn-login:active{opacity:.8;}
.login-err{font-family:var(--mono);font-size:11px;color:var(--red);min-height:16px;text-align:center;margin-top:8px;}

/* ── DASHBOARD ── */
#dashWrap{display:none;position:relative;z-index:1;min-height:100vh;}
#dashWrap.show{display:block;}
header{
  background:rgba(6,14,30,0.88);
  backdrop-filter:var(--glass);
  border-bottom:1px solid var(--border);
  padding:16px 24px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.hdr-logo{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:2px;background:linear-gradient(135deg,#60a5fa,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.hdr-sub{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:2px;margin-top:2px;}
.btn-logout{background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.2);color:var(--red);font-family:var(--mono);font-size:11px;padding:6px 14px;border-radius:8px;cursor:pointer;}

main{padding:24px;max-width:1100px;margin:0 auto;}

/* ── STATS ── */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.stat{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:16px;padding:18px;position:relative;overflow:hidden;}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(59,130,246,0.4),rgba(6,182,212,0.2),transparent);}
.stat-v{font-family:var(--display);font-size:36px;font-weight:800;letter-spacing:2px;color:var(--blue2);}
.stat-k{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-top:4px;}

/* ── SECTION ── */
.section{background:var(--surface);backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:20px;}
.section-title{font-family:var(--mono);font-size:10px;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.search-box{background:rgba(14,28,58,0.7);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:12px;padding:6px 12px;outline:none;width:200px;}
.search-box:focus{border-color:var(--blue);}

/* ── TABLE ── */
table{width:100%;border-collapse:collapse;}
th{font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);}
td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(59,130,246,0.04);}
.biz-name{font-weight:600;font-size:14px;}
.biz-code{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px;}
.badge{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:20px;display:inline-block;}
.badge.free{background:rgba(107,130,168,0.15);color:var(--text2);border:1px solid rgba(107,130,168,0.2);}
.badge.pro{background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.1));color:var(--cyan);border:1px solid rgba(6,182,212,0.3);}
.btn-sm{font-family:var(--mono);font-size:10px;padding:5px 12px;border-radius:7px;border:none;cursor:pointer;transition:all .15s;}
.btn-upgrade{background:linear-gradient(135deg,rgba(59,130,246,0.2),rgba(6,182,212,0.1));color:var(--blue2);border:1px solid rgba(59,130,246,0.3);}
.btn-upgrade:hover{background:linear-gradient(135deg,rgba(59,130,246,0.35),rgba(6,182,212,0.2));}
.btn-downgrade{background:rgba(107,130,168,0.1);color:var(--text2);border:1px solid rgba(107,130,168,0.2);}
.btn-delete{background:rgba(248,113,113,0.1);color:var(--red);border:1px solid rgba(248,113,113,0.2);}
.btn-delete:hover{background:rgba(248,113,113,0.2);}
.emp-count{font-family:var(--mono);font-size:12px;}
.reg-date{font-family:var(--mono);font-size:11px;color:var(--text2);}

/* ── NOTIFY EMAILS ── */
.email-item{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);}
.email-item:last-child{border-bottom:none;}
.email-addr{font-family:var(--mono);font-size:12px;color:var(--blue2);}
.email-biz{font-family:var(--mono);font-size:10px;color:var(--text2);margin-top:2px;}

/* ── TOAST ── */
.toast-w{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.toast{background:rgba(10,22,48,0.95);backdrop-filter:blur(12px);border:1px solid var(--border2);border-top:2px solid var(--blue);border-radius:12px;padding:10px 18px;font-family:var(--mono);font-size:12px;color:var(--text);box-shadow:0 12px 40px rgba(0,0,0,0.6);animation:su .25s cubic-bezier(.34,1.56,.64,1),tout .3s 2.3s ease forwards;white-space:nowrap;}
.toast.success{border-top-color:var(--green);}
.toast.error{border-top-color:var(--red);}
.toast.warn{border-top-color:var(--amber);}
@keyframes su{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes tout{from{opacity:1}to{opacity:0}}

/* ── EMPTY ── */
.empty{text-align:center;padding:40px;color:var(--text3);font-family:var(--mono);font-size:12px;}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  .stats{grid-template-columns:repeat(2,1fr);}
  table{font-size:11px;}
  td,th{padding:8px 6px;}
  .search-box{width:130px;}
}
</style>
</head>
<body>

<div class="toast-w" id="toastW"></div>

<!-- LOGIN -->
<div id="loginWrap">
  <div class="login-box">
    <div class="login-logo">EMS</div>
    <div class="login-sub">OWNER DASHBOARD</div>
    <div class="field">
      <label>Admin Password</label>
      <input type="password" id="adminPwd" placeholder="Enter admin password…" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">Access Dashboard →</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashWrap">
  <header>
    <div>
      <div class="hdr-logo">EMS</div>
      <div class="hdr-sub">OWNER DASHBOARD</div>
    </div>
    <button class="btn-logout" onclick="doLogout()">⏏ Logout</button>
  </header>

  <main>
    <!-- Stats -->
    <div class="stats">
      <div class="stat">
        <div class="stat-v" id="statTotal">—</div>
        <div class="stat-k">Total Businesses</div>
      </div>
      <div class="stat" style="--blue2:var(--cyan);">
        <div class="stat-v" id="statPro" style="color:var(--cyan);">—</div>
        <div class="stat-k">Pro Plans</div>
      </div>
      <div class="stat">
        <div class="stat-v" id="statFree" style="color:var(--text2);">—</div>
        <div class="stat-k">Free Plans</div>
      </div>
      <div class="stat">
        <div class="stat-v" id="statEmps" style="color:var(--green);">—</div>
        <div class="stat-k">Total Employees</div>
      </div>
    </div>

    <!-- Businesses table -->
    <div class="section">
      <div class="section-title">
        <span>All Businesses</span>
        <input class="search-box" type="text" id="searchBox" placeholder="Search…" oninput="filterBiz()">
      </div>
      <div style="overflow-x:auto;">
        <table>
          <thead>
            <tr>
              <th>Business</th>
              <th>Plan</th>
              <th>Employees</th>
              <th>Registered</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="bizTable"></tbody>
        </table>
      </div>
      <div id="bizEmpty" class="empty" style="display:none;">No businesses yet</div>
    </div>

    <!-- Notify emails -->
    <div class="section">
      <div class="section-title">Upgrade Interest (Notify Me Emails)</div>
      <div id="emailList"></div>
      <div id="emailEmpty" class="empty" style="display:none;">No emails collected yet</div>
    </div>
  </main>
</div>

<script>
'use strict';
var API = 'https://ems-api-mgye.onrender.com';
var API_KEY = 'ems-aP7kNx3QvL9mRt2Wz8Yc5Jd';
var ADMIN_KEY = 'ems-admin-Hq4BnXe6Ks1Vf0Yw3Mg';
var allBizData = [];

function toast(msg, type){
  var w = document.getElementById('toastW');
  var t = document.createElement('div');
  t.className = 'toast' + (type ? ' '+type : '');
  t.textContent = msg;
  w.appendChild(t);
  setTimeout(function(){ t.remove(); }, 2700);
}

async function apiFetch(method, path, body){
  var opts = {
    method: method,
    headers: {'Content-Type':'application/json','x-api-key':API_KEY,'x-admin-key':ADMIN_KEY}
  };
  if(body) opts.body = JSON.stringify(body);
  var res = await fetch(API + path, opts);
  if(!res.ok){ var e = await res.json().catch(function(){return {};}); throw new Error(e.error||res.statusText); }
  return res.json();
}

// ── AUTH ──
async function doLogin(){
  var pwd = document.getElementById('adminPwd').value.trim();
  if(!pwd){ document.getElementById('loginErr').textContent = 'Enter password'; return; }
  // Verify against backend - don't check client-side
  try{
    var res = await fetch(API+'/api/admin/businesses', {
      headers:{'Content-Type':'application/json','x-api-key':API_KEY,'x-admin-key':pwd}
    });
    if(!res.ok){ document.getElementById('loginErr').textContent = 'Incorrect password'; return; }
    ADMIN_KEY = pwd; // Store for subsequent requests
    sessionStorage.setItem('ems_admin_auth', '1');
    sessionStorage.setItem('ems_admin_key', pwd);
    document.getElementById('loginWrap').classList.add('hidden');
    document.getElementById('dashWrap').classList.add('show');
    loadDashboard();
  }catch(e){
    document.getElementById('loginErr').textContent = 'Connection error — try again';
  }
}

function doLogout(){
  sessionStorage.removeItem('ems_admin_auth');
  sessionStorage.removeItem('ems_admin_key');
  document.getElementById('loginWrap').classList.remove('hidden');
  document.getElementById('dashWrap').classList.remove('show');
  document.getElementById('adminPwd').value = '';
}

// Auto-login if session active
if(sessionStorage.getItem('ems_admin_auth') === '1'){
  ADMIN_KEY = sessionStorage.getItem('ems_admin_key') || ADMIN_KEY;
  document.getElementById('loginWrap').classList.add('hidden');
  document.getElementById('dashWrap').classList.add('show');
  loadDashboard();
}

// ── LOAD DATA ──
async function loadDashboard(){
  try{
    var data = await apiFetch('GET', '/api/admin/businesses');
    allBizData = data;
    renderStats(data);
    renderBizTable(data);
    renderEmails(data);
  }catch(e){
    toast('Failed to load: '+e.message, 'error');
  }
}

function renderStats(data){
  var pro = data.filter(function(b){return b.plan==='pro';}).length;
  var free = data.filter(function(b){return b.plan==='free'||!b.plan;}).length;
  var totalEmps = data.reduce(function(a,b){return a+(b.emp_count||0);},0);
  document.getElementById('statTotal').textContent = data.length;
  document.getElementById('statPro').textContent = pro;
  document.getElementById('statFree').textContent = free;
  document.getElementById('statEmps').textContent = totalEmps;
}

function renderBizTable(data){
  var tbody = document.getElementById('bizTable');
  var empty = document.getElementById('bizEmpty');
  if(data.length === 0){
    tbody.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  tbody.innerHTML = data.map(function(b){
    var d = new Date(b.created_at);
    var dateStr = d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
    var isPro = b.plan === 'pro';
    return '<tr id="biz-row-'+b.id+'">'+
      '<td><div class="biz-name">'+escHtml(b.name)+'</div><div class="biz-code">'+escHtml(b.code)+'</div></td>'+
      '<td><span class="badge '+(isPro?'pro':'free')+'">'+(isPro?'PRO':'FREE')+'</span></td>'+
      '<td><span class="emp-count">'+b.emp_count+'</span></td>'+
      '<td><span class="reg-date">'+dateStr+'</span></td>'+
      '<td style="display:flex;gap:6px;flex-wrap:wrap;">'+
        (isPro
          ? '<button class="btn-sm btn-downgrade" onclick="setPlan('+b.id+',\'free\')">↓ Free</button>'
          : '<button class="btn-sm btn-upgrade" onclick="setPlan('+b.id+',\'pro\')">↑ Pro</button>'
        )+
        '<button class="btn-sm btn-delete" onclick="deleteBiz('+b.id+',\''+escHtml(b.name)+'\')">✕ Delete</button>'+
      '</td>'+
    '</tr>';
  }).join('');
}

function renderEmails(data){
  var list = document.getElementById('emailList');
  var empty = document.getElementById('emailEmpty');
  var withEmail = data.filter(function(b){return b.notify_email;});
  if(withEmail.length === 0){
    list.innerHTML = '';
    empty.style.display = '';
    return;
  }
  empty.style.display = 'none';
  list.innerHTML = withEmail.map(function(b){
    return '<div class="email-item">'+
      '<div><div class="email-addr">'+escHtml(b.notify_email)+'</div>'+
      '<div class="email-biz">'+escHtml(b.name)+' · '+escHtml(b.code)+'</div></div>'+
      '<a href="mailto:'+escHtml(b.notify_email)+'" style="font-family:var(--mono);font-size:11px;color:var(--blue2);text-decoration:none;">✉ Email</a>'+
    '</div>';
  }).join('');
}

function filterBiz(){
  var q = document.getElementById('searchBox').value.toLowerCase();
  var filtered = allBizData.filter(function(b){
    return b.name.toLowerCase().includes(q) || b.code.toLowerCase().includes(q);
  });
  renderBizTable(filtered);
}

// ── ACTIONS ──
async function setPlan(id, plan){
  try{
    var result = await apiFetch('PATCH', '/api/admin/businesses/'+id+'/plan', {plan: plan});
    // Update local data
    var biz = allBizData.find(function(b){return b.id===id;});
    if(biz) biz.plan = plan;
    renderStats(allBizData);
    renderBizTable(allBizData);
    toast(result.name+' → '+plan.toUpperCase(), 'success');
  }catch(e){ toast('Failed: '+e.message, 'error'); }
}

async function deleteBiz(id, name){
  if(!confirm('Delete "'+name+'"? This will remove ALL employees, shifts and data. This cannot be undone.')) return;
  try{
    await apiFetch('DELETE', '/api/admin/businesses/'+id);
    allBizData = allBizData.filter(function(b){return b.id!==id;});
    renderStats(allBizData);
    renderBizTable(allBizData);
    renderEmails(allBizData);
    toast(name+' deleted', 'warn');
  }catch(e){ toast('Failed: '+e.message, 'error'); }
}

function escHtml(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
